<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stuart Dash" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Stuart Dash - Rental Manager</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
    }

    body {
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }

    main {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .container {
      padding: 16px;
      padding-bottom: 80px;
      width: 100%;
    }

    /* Header */
    .header {
      margin-bottom: 24px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }

    .header-updated {
      font-size: 11px;
      color: #555;
    }

    /* Room Pills */
    .rooms {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .room-pill {
      flex: 1;
      min-width: 160px;
      padding: 12px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .room-pill:active {
      transform: scale(0.98);
    }

    .room-pill-name {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .room-pill-date {
      font-size: 11px;
      color: #888;
    }

    .room-pill.available {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.05);
    }

    .room-pill.available .room-pill-date {
      color: #22c55e;
    }

    /* Stats Bar */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }

    .stat-item {
      padding: 12px 8px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .stat-item:active {
      transform: scale(0.95);
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-item.live .stat-value { color: #22c55e; }
    .stat-item.pending .stat-value { color: #eab308; }
    .stat-item.prospects .stat-value { color: #3b82f6; }
    .stat-item.actions .stat-value { color: #f97316; }

    /* Sections */
    .section {
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    /* Cards and List Items */
    .card, .list-item {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .card:active, .list-item:active {
      background: #1a1a1a;
    }

    /* Action Cards */
    .action-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .action-icon {
      font-size: 20px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .action-content {
      flex: 1;
    }

    .action-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .action-text {
      font-size: 12px;
      color: #ccc;
      line-height: 1.4;
    }

    .action-card.done .action-title,
    .action-card.done .action-text {
      color: #555;
    }

    /* List Item Format */
    .item-header {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
    }

    .item-left {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .item-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .item-detail {
      font-size: 11px;
      color: #888;
    }

    .item-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.live { background: #22c55e; }
    .status-dot.pending { background: #eab308; }
    .status-dot.warn { background: #f97316; }
    .status-dot.error { background: #ef4444; }

    .status-dot.warn {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Expanded Views */
    .expanded-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .expanded-content.active {
      max-height: 1000px;
    }

    .expanded-body {
      padding-top: 12px;
      border-top: 1px solid #222;
      margin-top: 12px;
    }

    .notes-section {
      margin-bottom: 12px;
    }

    .notes-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .notes-text {
      font-size: 12px;
      color: #aaa;
      line-height: 1.5;
      background: rgba(255, 255, 255, 0.02);
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .notes-textarea {
      width: 100%;
      padding: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #222;
      border-radius: 4px;
      color: #e5e5e5;
      font-family: inherit;
      font-size: 12px;
      resize: vertical;
      min-height: 60px;
      margin-bottom: 8px;
    }

    .notes-textarea::placeholder {
      color: #555;
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #222;
      background: rgba(255, 255, 255, 0.05);
      color: #e5e5e5;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-primary {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    .btn-primary:active {
      background: #2563eb;
    }

    .btn-danger {
      background: #ef4444;
      border-color: #ef4444;
      color: #fff;
    }

    .btn-danger:active {
      background: #dc2626;
    }

    .btn-small {
      flex: 0 1 auto;
      padding: 6px 8px;
      font-size: 11px;
    }

    .checkbox-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
    }

    .checkbox {
      width: 16px;
      height: 16px;
      border: 1px solid #222;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      cursor: pointer;
    }

    .checkbox.checked {
      background: #22c55e;
      border-color: #22c55e;
    }

    .flag-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
    }

    .flag-btn.flagged {
      color: #f97316;
    }

    /* Prospect Status Badge */
    .prospect-badge {
      display: inline-block;
      padding: 2px 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-right: 6px;
    }

    .prospect-badge.responded { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .prospect-badge.screening { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .prospect-badge.stale { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

    .prospect-source {
      font-size: 11px;
      color: #888;
    }

    .prospect-archived {
      opacity: 0.5;
    }

    /* Log Summary */
    .log-summary {
      font-size: 12px;
      line-height: 1.6;
      color: #aaa;
    }

    .log-section {
      margin-bottom: 12px;
    }

    .log-label {
      font-weight: 600;
      color: #888;
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
    }

    .log-item {
      font-size: 12px;
      margin-bottom: 4px;
      padding-left: 12px;
    }

    .log-item:before {
      content: "→";
      margin-right: 6px;
      color: #555;
    }

    /* Empty State */
    .empty-state {
      padding: 24px 16px;
      text-align: center;
      color: #888;
      font-size: 13px;
    }

    /* Pull to Refresh Hint */
    .pull-hint {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: #555;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: #141414;
      border-top: 1px solid #222;
      display: flex;
      justify-content: space-around;
      padding-bottom: env(safe-area-inset-bottom);
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      text-decoration: none;
      color: #888;
      font-size: 10px;
      transition: all 0.2s ease;
      -webkit-user-select: none;
      user-select: none;
    }

    .nav-item.active {
      color: #3b82f6;
    }

    .nav-icon {
      font-size: 18px;
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      body {
        width: 100vw;
        padding-left: 0;
        padding-right: 0;
      }

      main {
        width: 100vw;
      }

      .bottom-nav {
        width: 100vw;
        left: env(safe-area-inset-left);
      }
    }

    /* Loading and Error States */
    .loading {
      text-align: center;
      padding: 40px 16px;
      color: #888;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #222;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Utility */
    .hidden {
      display: none !important;
    }

    .opacity-50 {
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <main id="main">
    <div class="pull-hint">↓ Pull to refresh</div>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div class="header-title" id="headerTitle">2322 Stuart St</div>
        <div class="header-subtitle" id="headerSubtitle">Berkeley Rental Manager</div>
        <div class="header-updated" id="headerUpdated">Loading...</div>
      </div>

      <!-- Room Pills -->
      <div class="rooms" id="roomsContainer"></div>

      <!-- Stats -->
      <div class="stats" id="statsContainer"></div>

      <!-- Action Required -->
      <div class="section">
        <div class="section-title">Action Required</div>
        <div id="actionsContainer"></div>
      </div>

      <!-- Listing Platforms -->
      <div class="section">
        <div class="section-title">Listing Platforms</div>
        <div id="listingsContainer"></div>
      </div>

      <!-- Facebook Groups -->
      <div class="section">
        <div class="section-title">Facebook Groups</div>
        <div id="facebookGroupsContainer"></div>
      </div>

      <!-- Prospect Pipeline -->
      <div class="section">
        <div class="section-title">Prospect Pipeline</div>
        <div id="prospectsContainer"></div>
      </div>

      <!-- Tours -->
      <div class="section">
        <div class="section-title">Tours</div>
        <div id="toursContainer"></div>
      </div>

      <!-- System Status -->
      <div class="section">
        <div class="section-title">System Status</div>
        <div id="systemContainer"></div>
      </div>

      <!-- Log Summary -->
      <div class="section">
        <div class="section-title">Activity Log</div>
        <div id="logContainer" class="card" style="cursor: pointer;">
          <div style="font-weight: 600; margin-bottom: 8px;">Tap to view log →</div>
          <div class="expanded-content" id="logContent">
            <div class="expanded-body">
              <div class="log-summary" id="logSummaryContent"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="nav-item active" id="navDash">
      <div class="nav-icon">📊</div>
      <div>Dashboard</div>
    </div>
    <a href="tel:7146120723" class="nav-item">
      <div class="nav-icon">☎️</div>
      <div>Call Line</div>
    </a>
    <a href="https://sfbay.craigslist.org/eby/roo/d/berkeley-huge-400sqft-furnished-room/7921147509.html" target="_blank" class="nav-item">
      <div class="nav-icon">📍</div>
      <div>CL Listing</div>
    </a>
    <a href="mailto:berkeleystuarthouse@gmail.com" class="nav-item">
      <div class="nav-icon">✉️</div>
      <div>Email</div>
    </a>
  </nav>

  <script>
    // ============================================================================
    // DATA & CONSTANTS
    // ============================================================================

    const SAMPLE_DATA = {
      lastUpdated: "2026-04-03T18:12:00Z",
      property: {
        address: "2322 Stuart St",
        subtitle: "Berkeley Rental Manager",
        rooms: [
          { name: "Room A (King)", price: 1650, status: "available", availableDate: "2026-08-01" },
          { name: "Room B (Queen)", price: 1650, status: "available", availableDate: "2026-08-01" }
        ]
      },
      stats: { live: 6, pending: 4, prospects: 2, actions: 3 },
      actions: [
        { id: "act-1", icon: "💬", priority: "Patricia", text: "wants a video tour — reply pending your approval" },
        { id: "act-2", icon: "💬", priority: "Wenfamus Maximus", text: "messaged on FB Marketplace (Mar 29 11:38 AM) — needs response" },
        { id: "act-3", icon: "⚠️", priority: "SpareRoom", text: "listing not live — confirm registration email and post listing manually" }
      ],
      listings: [
        { id: "lst-cl", name: "Craigslist", detail: "Posted 03/14 · 15 days old · renew ~04/27", status: "live", category: "platform", notes: "Posting from 03/14, 15 days old. Renewal recommended by 04/27." },
        { id: "lst-zil", name: "Zillow → Trulia + HotPads", detail: "Live 1 day · 1 new lead (bot-blocked, check manually)", status: "warn", category: "platform", notes: "New lead arrived but blocked by bot verification. Needs manual review." },
        { id: "lst-fbm", name: "Facebook Marketplace", detail: "Active · 2 conversations (Patricia + Wenfamus)", status: "live", category: "platform", notes: "Two active conversations ongoing. Monitor for new inquiries." },
        { id: "lst-sr", name: "SpareRoom", detail: "Registration email not confirmed — not live", status: "error", category: "platform", notes: "Account created but registration email not confirmed. Listing is not visible to prospects." },
        { id: "lst-cal", name: "CalRentals (UC Berkeley)", detail: "$30/mo paid · pending UC review · expect ~03/30", status: "pending", category: "platform", notes: "Submitted for UC review. Expects approval around 03/30. Payment confirmed." },
        { id: "lst-apt", name: "Apartments.com", detail: "Site error on add property · needs support call", status: "error", category: "platform", notes: "Technical error encountered during property listing. Support call needed." },
        { id: "fbg-1", name: "UC Berkeley Off-Campus Housing", detail: "89.7K · posted 03/28", status: "live", category: "facebook_group", notes: "Posted to 89,700 member group. Strong reach for Berkeley students." },
        { id: "fbg-2", name: "UC Berkeley Housing, Rooms, Apts", detail: "47.6K · posted 03/28", status: "live", category: "facebook_group", notes: "Posted to 47,600 member housing group. Good engagement expected." },
        { id: "fbg-3", name: "Berkeley & Bay Area Off-Campus", detail: "16.4K · posted 03/28", status: "live", category: "facebook_group", notes: "Posted to 16,400 member regional housing group." },
        { id: "fbg-4", name: "Berkeley CA Rentals", detail: "6.5K · posted 03/28", status: "live", category: "facebook_group", notes: "Posted to 6,500 member local rentals group." }
      ],
      prospects: [
        { id: "prsp-1", name: "Wenfamus Maximus", source: "FB Marketplace", status: "RESPONDED", date: "03/29/2026", notes: "Screening Qs sent 04/01 · awaiting reply", actionNeeded: "Follow up if no reply by 04/05", active: true },
        { id: "prsp-2", name: "Julian Flanagan", source: "SpareRoom", status: "SCREENING", date: "04/02/2026", notes: "Incoming Berkeley grad student. Screening questions sent 04/03.", actionNeeded: "Awaiting Julian's screening responses", active: true },
        { id: "prsp-3", name: "Patricia", source: "FB Marketplace", status: "STALE", date: "03/29/2026", notes: "No reply to tour offer in 5 days · archived", actionNeeded: null, active: false }
      ],
      tours: { scheduled: [], completed: [] },
      system: [
        { name: "Daily Check Task", detail: "Runs 9 AM daily", status: "live" },
        { name: "Email Monitoring", detail: "berkeleystuarthouse@gmail.com", status: "live" },
        { name: "iMessage Monitoring", detail: "(714) 612-0723 · needs Claude app restart", status: "error" },
        { name: "Facebook Messenger", detail: "Manual check via Chrome MCP", status: "pending" }
      ],
      log: {
        date: "04/03/2026",
        worked: ["SpareRoom screening response sent to Julian Flanagan", "Confirmed SpareRoom listing LIVE", "Confirmed Craigslist listing LIVE", "FB Marketplace inbox checked"],
        failed: ["SpareRoom inbox navigation issue", "CalRentals inbox not directly checked", "FB Bay Area/SF Housing still PENDING"],
        improvement: "Check if there's a way to feature or bump the SpareRoom listing",
        metrics: { SpareRoom: "1 inquiry (Julian)", Craigslist: "still live", "FB Marketplace": "Wenfamus pending, Patricia archived", "Active Prospects": "2" }
      }
    };

    const STORAGE_KEYS = {
      notes: "stuart_dash_notes",
      flags: "stuart_dash_flags",
      done: "stuart_dash_done"
    };

    let appData = { ...SAMPLE_DATA };

    // ============================================================================
    // STORAGE UTILITIES
    // ============================================================================

    const Storage = {
      getNotes(itemId) {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEYS.notes) || "{}");
        return data[itemId] || "";
      },
      setNotes(itemId, text) {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEYS.notes) || "{}");
        data[itemId] = text;
        localStorage.setItem(STORAGE_KEYS.notes, JSON.stringify(data));
      },
      isFlagged(itemId) {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEYS.flags) || "{}");
        return !!data[itemId];
      },
      toggleFlag(itemId) {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEYS.flags) || "{}");
        data[itemId] = !data[itemId];
        localStorage.setItem(STORAGE_KEYS.flags, JSON.stringify(data));
      },
      isDone(itemId) {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEYS.done) || "{}");
        return !!data[itemId];
      },
      toggleDone(itemId) {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEYS.done) || "{}");
        data[itemId] = !data[itemId];
        localStorage.setItem(STORAGE_KEYS.done, JSON.stringify(data));
      }
    };

    // ============================================================================
    // DOM UTILITIES
    // ============================================================================

    function formatDate(isoString) {
      const date = new Date(isoString);
      const now = new Date();
      const sameDay = date.toDateString() === now.toDateString();

      if (sameDay) {
        return date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", meridiem: "short" });
      }
      return date.toLocaleDateString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit", meridiem: "short" });
    }

    function createStatusDot(status) {
      const el = document.createElement("div");
      el.className = `status-dot ${status}`;
      return el;
    }

    function toggleExpanded(cardEl) {
      const content = cardEl.querySelector(".expanded-content");
      if (content) {
        content.classList.toggle("active");
      }
    }

    // ============================================================================
    // RENDER FUNCTIONS
    // ============================================================================

    function renderHeader() {
      const { property, lastUpdated } = appData;
      document.getElementById("headerTitle").textContent = property.address;
      document.getElementById("headerSubtitle").textContent = property.subtitle;
      document.getElementById("headerUpdated").textContent = `Last updated: ${formatDate(lastUpdated)}`;
    }

    function renderRooms() {
      const { rooms } = appData.property;
      const container = document.getElementById("roomsContainer");
      container.innerHTML = rooms.map(room => {
        const availDate = new Date(room.availableDate);
        const dateStr = availDate.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "2-digit" });
        return `
          <div class="room-pill ${room.status === 'available' ? 'available' : ''}">
            <div class="room-pill-name">${room.name}</div>
            <div class="room-pill-date">Available ${dateStr}</div>
          </div>
        `;
      }).join("");
    }

    function renderStats() {
      const { stats } = appData;
      const statTypes = [
        { key: "live", label: "Live", class: "live" },
        { key: "pending", label: "Pending", class: "pending" },
        { key: "prospects", label: "Prospects", class: "prospects" },
        { key: "actions", label: "Actions", class: "actions" }
      ];
      const container = document.getElementById("statsContainer");
      container.innerHTML = statTypes.map(stat => `
        <div class="stat-item ${stat.class}">
          <div class="stat-value">${stats[stat.key]}</div>
          <div class="stat-label">${stat.label}</div>
        </div>
      `).join("");
    }

    function renderActions() {
      const { actions } = appData;
      const container = document.getElementById("actionsContainer");
      container.innerHTML = actions.map(action => {
        const isDone = Storage.isDone(action.id);
        const isFlagged = Storage.isFlagged(action.id);
        const userNotes = Storage.getNotes(action.id);
        return `
          <div class="card action-card ${isDone ? 'done' : ''}" data-id="${action.id}">
            <div class="action-card" onclick="toggleExpanded(this.closest('.card'))">
              <div class="action-icon">${action.icon}</div>
              <div class="action-content">
                <div class="action-title">${action.priority}</div>
                <div class="action-text">${action.text}</div>
              </div>
              <button class="flag-btn ${isFlagged ? 'flagged' : ''}" onclick="event.stopPropagation(); toggleFlag('${action.id}')">🚩</button>
            </div>
            <div class="expanded-content ${this && this.classList && this.classList.contains('expanded') ? 'active' : ''}">
              <div class="expanded-body">
                <div class="button-group">
                  <button class="btn checkbox-btn" onclick="toggleDone('${action.id}')">
                    <div class="checkbox ${isDone ? 'checked' : ''}">✓</div>
                    <span>Mark Done</span>
                  </button>
                </div>
                <div class="notes-section">
                  <div class="notes-label">Your Notes</div>
                  <textarea class="notes-textarea" placeholder="Add your notes..." onchange="saveNotes('${action.id}', this.value)">${userNotes}</textarea>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");

      // Add click handlers for cards
      container.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", function(e) {
          if (!e.target.closest(".flag-btn") && !e.target.closest(".checkbox-btn") && !e.target.closest("textarea")) {
            toggleExpanded(this);
          }
        });
      });
    }

    function renderListings() {
      const platforms = appData.listings.filter(l => l.category === "platform");
      const container = document.getElementById("listingsContainer");
      container.innerHTML = platforms.map(item => {
        const isFlagged = Storage.isFlagged(item.id);
        const userNotes = Storage.getNotes(item.id);
        return `
          <div class="card list-item" data-id="${item.id}">
            <div class="item-header" onclick="toggleExpanded(this.closest('.card'))">
              <div class="item-left">
                <div class="item-name">${item.name}</div>
                <div class="item-detail">${item.detail}</div>
              </div>
              <div class="item-right">
                ${createStatusDot(item.status).outerHTML}
                <button class="flag-btn ${isFlagged ? 'flagged' : ''}" onclick="event.stopPropagation(); toggleFlag('${item.id}')">🚩</button>
              </div>
            </div>
            <div class="expanded-content">
              <div class="expanded-body">
                <div class="notes-section">
                  <div class="notes-label">Platform Notes</div>
                  <div class="notes-text">${item.notes || "No notes"}</div>
                </div>
                <div class="notes-section">
                  <div class="notes-label">Your Notes</div>
                  <textarea class="notes-textarea" placeholder="Add your notes..." onchange="saveNotes('${item.id}', this.value)">${userNotes}</textarea>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");

      container.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", function(e) {
          if (!e.target.closest(".flag-btn") && !e.target.closest("textarea")) {
            toggleExpanded(this);
          }
        });
      });
    }

    function renderFacebookGroups() {
      const groups = appData.listings.filter(l => l.category === "facebook_group");
      const container = document.getElementById("facebookGroupsContainer");

      if (groups.length === 0) {
        container.innerHTML = '<div class="empty-state">No Facebook groups configured</div>';
        return;
      }

      container.innerHTML = groups.map(item => {
        const isFlagged = Storage.isFlagged(item.id);
        const userNotes = Storage.getNotes(item.id);
        return `
          <div class="card list-item" data-id="${item.id}">
            <div class="item-header" onclick="toggleExpanded(this.closest('.card'))">
              <div class="item-left">
                <div class="item-name">${item.name}</div>
                <div class="item-detail">${item.detail}</div>
              </div>
              <div class="item-right">
                ${createStatusDot(item.status).outerHTML}
                <button class="flag-btn ${isFlagged ? 'flagged' : ''}" onclick="event.stopPropagation(); toggleFlag('${item.id}')">🚩</button>
              </div>
            </div>
            <div class="expanded-content">
              <div class="expanded-body">
                <div class="notes-section">
                  <div class="notes-label">Group Notes</div>
                  <div class="notes-text">${item.notes || "No notes"}</div>
                </div>
                <div class="notes-section">
                  <div class="notes-label">Your Notes</div>
                  <textarea class="notes-textarea" placeholder="Add your notes..." onchange="saveNotes('${item.id}', this.value)">${userNotes}</textarea>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");

      container.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", function(e) {
          if (!e.target.closest(".flag-btn") && !e.target.closest("textarea")) {
            toggleExpanded(this);
          }
        });
      });
    }

    function renderProspects() {
      const { prospects } = appData;
      const container = document.getElementById("prospectsContainer");

      if (prospects.length === 0) {
        container.innerHTML = '<div class="empty-state">No prospects yet</div>';
        return;
      }

      container.innerHTML = prospects.map(prospect => {
        const isFlagged = Storage.isFlagged(prospect.id);
        const userNotes = Storage.getNotes(prospect.id);
        const statusClass = prospect.status.toLowerCase();
        return `
          <div class="card list-item ${prospect.active ? '' : 'prospect-archived'}" data-id="${prospect.id}" style="opacity: ${prospect.active ? '1' : '0.5'}">
            <div class="item-header" onclick="toggleExpanded(this.closest('.card'))">
              <div class="item-left">
                <div class="item-name">
                  <span class="prospect-badge ${statusClass}">${prospect.status}</span>
                  ${prospect.name}
                </div>
                <div class="item-detail prospect-source">${prospect.source} · ${prospect.date}</div>
                ${prospect.actionNeeded ? `<div class="item-detail" style="color: #f97316; margin-top: 4px;">${prospect.actionNeeded}</div>` : ''}
              </div>
              <div class="item-right">
                <button class="flag-btn ${isFlagged ? 'flagged' : ''}" onclick="event.stopPropagation(); toggleFlag('${prospect.id}')">🚩</button>
              </div>
            </div>
            <div class="expanded-content">
              <div class="expanded-body">
                <div class="notes-section">
                  <div class="notes-label">Prospect Notes</div>
                  <div class="notes-text">${prospect.notes || "No notes"}</div>
                </div>
                <div class="notes-section">
                  <div class="notes-label">Your Notes</div>
                  <textarea class="notes-textarea" placeholder="Add your notes..." onchange="saveNotes('${prospect.id}', this.value)">${userNotes}</textarea>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");

      container.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", function(e) {
          if (!e.target.closest(".flag-btn") && !e.target.closest("textarea")) {
            toggleExpanded(this);
          }
        });
      });
    }

    function renderTours() {
      const { tours } = appData;
      const container = document.getElementById("toursContainer");

      if (!tours.scheduled || tours.scheduled.length === 0) {
        container.innerHTML = '<div class="empty-state">No tours scheduled</div>';
        return;
      }

      container.innerHTML = tours.scheduled.map(tour => `
        <div class="card list-item">
          <div class="item-name">${tour.name}</div>
          <div class="item-detail">${tour.date} at ${tour.time}</div>
        </div>
      `).join("");
    }

    function renderSystem() {
      const { system } = appData;
      const container = document.getElementById("systemContainer");
      container.innerHTML = system.map(item => {
        const isFlagged = Storage.isFlagged(item.name);
        return `
          <div class="card list-item" data-id="${item.name}">
            <div class="item-header">
              <div class="item-left">
                <div class="item-name">${item.name}</div>
                <div class="item-detail">${item.detail}</div>
              </div>
              <div class="item-right">
                ${createStatusDot(item.status).outerHTML}
                <button class="flag-btn ${isFlagged ? 'flagged' : ''}" onclick="event.stopPropagation(); toggleFlag('${item.name}')">🚩</button>
              </div>
            </div>
          </div>
        `;
      }).join("");

      container.querySelectorAll(".flag-btn").forEach(btn => {
        btn.addEventListener("click", function(e) {
          e.stopPropagation();
        });
      });
    }

    function renderLog() {
      const { log } = appData;
      let html = `
        <div class="log-section">
          <div class="log-label">Worked</div>
          ${log.worked.map(item => `<div class="log-item">${item}</div>`).join("")}
        </div>
        <div class="log-section">
          <div class="log-label">Failed</div>
          ${log.failed.map(item => `<div class="log-item">${item}</div>`).join("")}
        </div>
        <div class="log-section">
          <div class="log-label">Next Improvement</div>
          <div style="padding: 8px; background: rgba(255, 255, 255, 0.02); border-radius: 4px; font-size: 12px;">${log.improvement}</div>
        </div>
        <div class="log-section">
          <div class="log-label">Metrics</div>
          ${Object.entries(log.metrics).map(([key, val]) => `<div class="log-item"><strong>${key}:</strong> ${val}</div>`).join("")}
        </div>
      `;
      document.getElementById("logSummaryContent").innerHTML = html;
    }

    // ============================================================================
    // EVENT HANDLERS
    // ============================================================================

    function saveNotes(itemId, text) {
      Storage.setNotes(itemId, text);
    }

    function toggleFlag(itemId) {
      Storage.toggleFlag(itemId);
      render();
    }

    function toggleDone(itemId) {
      Storage.toggleDone(itemId);
      render();
    }

    function scrollToTop() {
      document.getElementById("main").scrollTop = 0;
    }

    function loadData() {
      fetch("data.json")
        .then(res => res.json())
        .then(data => {
          appData = data;
          render();
        })
        .catch(() => {
          // Use sample data on error
          appData = SAMPLE_DATA;
          render();
        });
    }

    function render() {
      renderHeader();
      renderRooms();
      renderStats();
      renderActions();
      renderListings();
      renderFacebookGroups();
      renderProspects();
      renderTours();
      renderSystem();
      renderLog();
    }

    // ============================================================================
    // INITIALIZATION
    // ============================================================================

    function init() {
      // Load data
      loadData();

      // Setup navigation
      document.getElementById("navDash").addEventListener("click", scrollToTop);

      // Setup log toggle
      document.getElementById("logContainer").addEventListener("click", function() {
        const content = this.querySelector(".expanded-content");
        if (content) {
          content.classList.toggle("active");
        }
      });

      // Auto-refresh every 5 minutes
      setInterval(() => {
        loadData();
      }, 5 * 60 * 1000);
    }

    // Start app when DOM is ready
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  </script>
</body>
</html>
